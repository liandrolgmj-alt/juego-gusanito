name: Compilar APK Automáticamente

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar Capacitor y Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Gusanito Premium" "com.juego.gusanito" --web-dir .
          npx cap add android
          npx cap sync android

      - name: Configurar Java / JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar archivo APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v3
        with:
          name: Gusanito-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
